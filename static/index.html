<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园失物招领看板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">🏫</div>
                    <div class="brand-text">
                        <h1>校园失物招领看板</h1>
                        <p>发布信息 · 高效寻回 · 共建互助校园</p>
                    </div>
                </div>
                <div class="stats-bar" id="statsBar"></div>
            </div>
            <nav class="main-nav" id="mainNav">
                <button class="nav-tab active" data-view="public">📋 公开看板</button>
                <button class="nav-tab" data-view="mine">📝 我的发布</button>
                <button class="nav-tab badge" data-view="audit" id="auditTab" data-count="0">�️ 审核中心</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="action-bar">
            <div class="action-bar-top">
                <div class="view-title" id="viewTitle">
                    <h2>公开信息看板</h2>
                    <p>已审核通过的失物与招领信息</p>
                </div>
                <button id="openFormBtn" class="btn btn-primary">+ 发布信息</button>
            </div>
            <div class="filters" id="filters"></div>
        </section>

        <section class="my-form" id="myForm" style="display:none;">
            <div class="my-form-row">
                <div class="form-group">
                    <label for="myContact">输入您的联系方式查询发布记录 <span class="required">*</span></label>
                    <input type="text" id="myContact" name="myContact" placeholder="手机号 / 微信号 / QQ号">
                </div>
                <button id="queryMyBtn" class="btn btn-primary">🔍 查询</button>
            </div>
        </section>

        <div class="view-controls">
            <div class="result-count" id="resultCount">加载中...</div>
            <button id="resetFilterBtn" class="btn btn-ghost btn-sm">↺ 重置筛选</button>
        </div>

        <section id="itemBoard" class="item-board"></section>

        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-icon" id="emptyIcon">📭</div>
            <h3 id="emptyTitle">暂无相关信息</h3>
            <p id="emptyDesc">试试调整筛选条件或发布第一条信息吧！</p>
        </div>

        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <div>加载中...</div>
        </div>
    </main>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="formTitle">发布失物 / 招领信息</h2>
                <button class="close-btn" id="closeFormBtn">&times;</button>
            </div>
            <form id="itemForm" class="form">
                <div class="form-section">
                    <div class="form-section-title">基础信息</div>
                    <div class="form-group">
                        <label>信息类型 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label><input type="radio" name="item_type" value="lost" required> � 我丢了东西</label>
                            <label><input type="radio" name="item_type" value="found"> 🎉 我捡到了东西</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="title">物品名称 <span class="required">*</span></label>
                        <input type="text" id="title" name="title" placeholder="例如：黑色钱包、学生证、AirPods" required>
                    </div>
                    <div class="form-group">
                        <label for="description">详细描述</label>
                        <textarea id="description" name="description" rows="3" placeholder="描述物品特征、颜色、品牌、内含物品等细节，有助于更快找到失主"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">时间与地点</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">丢失/拾取地点 <span class="required">*</span></label>
                            <input type="text" id="location" name="location" placeholder="例如：图书馆三楼、一食堂二楼、3号教学楼" required>
                        </div>
                        <div class="form-group">
                            <label for="event_time">发生时间 <span class="required">*</span></label>
                            <input type="datetime-local" id="event_time" name="event_time" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">联系方式</div>
                    <div class="form-group">
                        <label for="contact">您的联系方式 <span class="required">*</span></label>
                        <input type="text" id="contact" name="contact" placeholder="手机号 / 微信号 / QQ号，用于后续沟通和查询我的发布" required>
                        <div class="helper">联系方式将同时用于"我的发布"查询入口，请妥善保管</div>
                    </div>
                    <div class="form-group">
                        <label for="image_url">图片链接 (可选)</label>
                        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                    </div>
                </div>

                <div class="form-group" style="background:var(--color-warning-light);border-left:4px solid var(--color-warning);padding:12px 16px;border-radius:var(--radius-md);margin-bottom:0;">
                    <p style="color:var(--color-warning);font-size:0.84rem;line-height:1.6;">
                        ⚠️ 提示：信息发布后将进入<strong>"待审核"</strong>状态，经管理员审核通过后才会出现在公开看板中。
                    </p>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelFormBtn">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitFormBtn">提交发布</button>
                </div>
            </form>
        </div>
    </div>

    <div id="auditModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="auditModalTitle">审核信息</h2>
                <button class="close-btn" id="closeAuditBtn">&times;</button>
            </div>
            <div class="form" id="auditForm">
                <div id="auditPreview" class="form-section" style="background:var(--color-gray-50);padding:16px;border-radius:var(--radius-md);border:1px solid var(--color-gray-200);margin-bottom:20px;"></div>
                <div class="form-section">
                    <div class="form-section-title">审核操作</div>
                    <div class="form-group">
                        <label for="auditRemark">审核备注 <span id="auditRemarkRequired" style="display:none;" class="required">*</span></label>
                        <textarea id="auditRemark" name="auditRemark" rows="3" placeholder="驳回时请填写驳回原因；通过时可为空"></textarea>
                    </div>
                </div>
                <div class="form-actions" style="margin-top:0;">
                    <button type="button" class="btn btn-secondary" id="cancelAuditBtn">取消</button>
                    <button type="button" class="btn btn-danger" id="auditRejectBtn">🚫 驳回</button>
                    <button type="button" class="btn btn-success" id="auditApproveBtn">✅ 通过审核</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
